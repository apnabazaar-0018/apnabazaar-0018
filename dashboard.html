<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RK Capital Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>RK Capital Dashboard</h1>

<p id="role"></p>

<button onclick="logout()">Logout</button>
<hr style="margin:30px 0;">

<h2>Customer Loan Applications & Documents</h2>

<p>View all customer leads and uploaded documents below.</p>

<iframe 
src="https://docs.google.com/spreadsheets/d/1axji5a8szqGLk7X-nVnMpBaEF3n7I_Tv0-P_6yqM04Q/edit?usp=sharing"
width="100%"
height="700"
style="border:none;">
</iframe>
<script>

let role=localStorage.getItem("role");

if(!role){
window.location.href="login.html";
}

document.getElementById("role").innerText="Logged in as: "+role;

function logout(){

localStorage.removeItem("role");
window.location.href="login.html";

}

</script>

</body>

</html>
