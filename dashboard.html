<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RK Capital Dashboard</title>

<link rel="stylesheet" href="style.css">

<style>

/* PAGE BACKGROUND */

body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#0b1f3a,#2f6fed);
color:white;
min-height:100vh;
}

/* HEADER */

.dashboard-header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
}

.dashboard-title{
font-size:22px;
font-weight:600;
}

.logout-btn{
background:white;
color:#2f6fed;
border:none;
padding:10px 20px;
border-radius:30px;
cursor:pointer;
font-weight:600;
}

/* MAIN CONTAINER */

.dashboard-container{
padding:40px 60px;
}

/* INFO CARDS */

.dashboard-stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.stat-card{
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:15px;
backdrop-filter:blur(8px);
}

.stat-card h3{
margin:0;
font-size:28px;
}

.stat-card p{
opacity:0.8;
margin-top:5px;
}

/* SHEET CONTAINER */

.sheet-container{
background:white;
border-radius:15px;
padding:10px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

.sheet-container iframe{
width:100%;
height:700px;
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="dashboard-header">

<div class="dashboard-title">
RK Capital Financial Services – Admin Panel
</div>

<button class="logout-btn" onclick="logout()">
Logout
</button>

</div>


<div class="dashboard-container">

<!-- STATS CARDS -->

<div class="dashboard-stats">

<div class="stat-card">
<h3>Live MIS</h3>
<p>Customer Applications</p>
</div>

<div class="stat-card">
<h3>Document Hub</h3>
<p>Uploaded Documents</p>
</div>

<div class="stat-card">
<h3>Lead Manager</h3>
<p>Update Status</p>
</div>

</div>


<!-- GOOGLE SHEET VIEW -->

<div class="sheet-container">

<iframe
src="https://docs.google.com/spreadsheets/d/1axji5a8szqGLk7X-nVnMpBaEF3n7I_Tv0-P_6yqM04Q/edit?usp=sharing">
</iframe>

</div>

</div>


<script>

/* ROLE CHECK */

let role=localStorage.getItem("role");

if(!role){
window.location.href="login.html";
}

/* LOGOUT */

function logout(){

localStorage.removeItem("role");
window.location.href="login.html";

}

</script>

</body>

</html>
