
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RK Capital Login</title>

<link rel="stylesheet" href="style.css">

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#0b1f3a,#2f6fed);
overflow:hidden;
font-family:'Inter',sans-serif;
}

/* ANIMATED FINTECH BACKGROUND */

.fintech-bg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
overflow:hidden;
z-index:0;
}

.shape{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.08);
animation:float 12s infinite ease-in-out;
}

.shape1{
width:200px;
height:200px;
top:10%;
left:10%;
}

.shape2{
width:300px;
height:300px;
bottom:15%;
right:10%;
animation-delay:3s;
}

.shape3{
width:150px;
height:150px;
top:40%;
right:30%;
animation-delay:6s;
}

@keyframes float{

0%{transform:translateY(0px);}
50%{transform:translateY(-30px);}
100%{transform:translateY(0px);}

}  

.login-box{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:40px;
border-radius:15px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
width:320px;
text-align:center;
color:white;
position:relative;
z-index:1;
}

.login-box input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
outline:none;
}

.login-box button{
width:100%;
padding:12px;
background:white;
color:#2f6fed;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
margin-top:10px;
}

.back-btn{
display:block;
margin-top:15px;
text-decoration:none;
color:#2f6fed;
font-weight:500;
font-size:14px;
}  
</style>

</head>

<body>

<div class="fintech-bg">

<div class="shape shape1"></div>
<div class="shape shape2"></div>
<div class="shape shape3"></div>

</div>
  
<div class="login-box">

<h2>RK Capital Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>
<a href="index.html" class="back-btn">← Back to Website</a>  

<p id="error"></p>

</div>

<script>

function login(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

/* Admin */

if(username==="admin" && password==="kautuk123"){

localStorage.setItem("role","admin");
window.location.href="dashboard.html";

}

/* Employee */

else if(username==="employee" && password==="emp123"){

localStorage.setItem("role","employee");
window.location.href="dashboard.html";

}

else{

document.getElementById("error").innerText="Invalid login";

}

}

</script>

</body>
</html>
